name: streetview-monitor

on:
  schedule:
    - cron: '30 21 * * *'   # 06:30 JST (= 21:30 UTC 前日) 毎日
  workflow_dispatch:          # 手動実行（初回はこれで走らせる）

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data.json and extract Ishikawa
        run: |
          curl -s --max-time 30 \
            "https://www.google.com/streetview/static/feed/driving/data.json" \
            -o data.json
          python3 scripts/extract.py

      - name: Commit state if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/streetview-ishikawa.json
          if git diff --cached --quiet; then
            echo "変更なし（コミットしません）"
          else
            git commit -m "chore: update streetview ishikawa state [skip ci]"
            git push
          fi
